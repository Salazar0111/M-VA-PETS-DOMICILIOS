<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fbf8f3">
<title>MÜVA · Jornada</title>
<link rel="manifest" href="/app/manifest.webmanifest">
<link rel="apple-touch-icon" href="/app/icono.svg">
<link rel="icon" href="/app/icono.svg" type="image/svg+xml">
<link rel="stylesheet" href="/app/fonts.css">
<link rel="stylesheet" href="/app/styles.css">
</head>
<body>

<!-- ============ 1 · INGRESO ============ -->
<section id="v-login" class="vista on">
  <div class="login-hero">
    <svg class="blob" viewBox="0 0 200 200" aria-hidden="true"><path fill="currentColor" d="M42,-58C54,-49,62,-35,66,-20C70,-4,70,13,63,27C56,41,42,52,26,60C10,68,-8,73,-25,68C-42,63,-58,48,-66,30C-74,12,-74,-9,-66,-26C-58,-43,-42,-56,-25,-63C-8,-70,10,-71,26,-68C31,-66,36,-63,42,-58Z" transform="translate(100 100)"/></svg>
    <div class="brand">
      <div class="paw">🐾</div>
      <div class="wm">müva</div>
      <div class="tag">Equipo veterinario</div>
    </div>
  </div>
  <form class="login-form" id="form-login">
    <div class="aviso err" id="login-error" role="alert"></div>
    <div class="campo">
      <label for="email">Correo</label>
      <input id="email" name="email" type="email" autocomplete="username" required inputmode="email" placeholder="tucorreo@muva.co">
    </div>
    <div class="campo">
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
    </div>
    <button class="btn btn-terra" id="btn-entrar" type="submit">Ingresar a mi jornada</button>
  </form>
</section>

<!-- ============ 2 · RUTA DEL DÍA ============ -->
<section id="v-ruta" class="vista">
  <header class="tope">
    <span class="brand-mini">müva</span>
    <button class="salir" id="btn-salir" type="button">Salir</button>
  </header>
  <div class="saludo">
    <div class="dia" id="ruta-fecha"></div>
    <h2 id="ruta-saludo">Tu jornada</h2>
  </div>
  <div class="resumen">
    <div><div class="n" id="r-total">—</div><div class="l">Visitas</div></div>
    <div class="sep"></div>
    <div><div class="n" id="r-hechas">—</div><div class="l">Completadas</div></div>
    <div class="sep"></div>
    <div><div class="n" id="r-km">—</div><div class="l">Recorrido</div></div>
  </div>
  <div class="lista" id="lista-visitas"></div>
</section>

<!-- ============ 3 · DETALLE DE VISITA ============ -->
<section id="v-detalle" class="vista">
  <div class="det-tope">
    <button class="volver" id="btn-volver" type="button" aria-label="Volver a la ruta">←</button>
    <span class="chip pend" id="d-posicion"></span>
  </div>
  <div class="det-hero">
    <div class="parada" id="d-parada"></div>
    <h2 id="d-mascota"></h2>
    <div class="sub" id="d-sub"></div>
  </div>
  <div class="filas">
    <div class="fila"><span class="k">Dirección</span><span class="v" id="d-dir"></span></div>
    <div class="fila"><span class="k">Motivo</span><span class="v" id="d-motivo"></span></div>
    <div class="fila"><span class="k">Hora</span><span class="v" id="d-hora"></span></div>
  </div>
  <a class="mapa-link" id="d-mapa" target="_blank" rel="noopener">Abrir en Google Maps ↗</a>

  <div class="obs-wrap oculto" id="d-obs-wrap">
    <label for="d-obs" class="obs-label">Observaciones de la visita <span class="obs-req">obligatorio</span></label>
    <textarea id="d-obs" class="obs-textarea" rows="4" placeholder="Motivo consultado, hallazgos, tratamiento indicado…"></textarea>

    <div class="obs-fila2">
      <div class="obs-campo">
        <label for="d-valor" class="obs-label">Valor cobrado <span class="obs-req">obligatorio</span></label>
        <div class="obs-valor-wrap">
          <span class="obs-prefijo">$</span>
          <input id="d-valor" class="obs-input" type="number" inputmode="numeric" min="0" step="1000" placeholder="80.000">
        </div>
      </div>
      <div class="obs-campo">
        <label for="d-pago" class="obs-label">Método de pago <span class="obs-req">obligatorio</span></label>
        <select id="d-pago" class="obs-input">
          <option value="" selected disabled>Elegir…</option>
          <option value="efectivo">Efectivo</option>
          <option value="transferencia">Transferencia / Nequi / Daviplata</option>
          <option value="link_pago">Link de pago</option>
        </select>
      </div>
    </div>
  </div>

  <div class="det-accion">
    <div class="aviso err" id="d-error" role="alert"></div>
    <div class="crono" id="d-crono" style="display:none"><span class="pulso"></span><span id="d-crono-txt"></span></div>
    <button class="btn btn-terra" id="btn-accion" type="button"></button>
  </div>
</section>

<!-- ============ 4 · CIERRE DE JORNADA ============ -->
<section id="v-cierre" class="vista">
  <div class="cierre-top">
    <div class="sello">✓</div>
    <div class="k">Jornada completada</div>
    <h2 id="c-titulo"></h2>
  </div>
  <div class="cierre-grid">
    <div class="dato"><div class="n" id="c-km"></div><div class="l">Recorrido</div></div>
    <div class="dato"><div class="n" id="c-desp"></div><div class="l">Desplazamiento</div></div>
    <div class="dato"><div class="n" id="c-consulta"></div><div class="l">En consulta</div></div>
    <div class="dato"><div class="n" id="c-prom"></div><div class="l">Promedio / visita</div></div>
  </div>
  <div class="cierre-nota">🌿 <span><b>Disponibilidad enviada a MÜVA.</b> <span id="c-libre"></span></span></div>
  <div class="cierre-accion">
    <button class="btn btn-terra" id="btn-volver-ruta" type="button">Volver a mi ruta</button>
  </div>
</section>

<script src="/app/app.js"></script>
</body>
</html>
